version: "3.9"

services:
  # ─── Backend (FastAPI + yt-dlp + FFmpeg) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: superda-backend
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - MAX_CONCURRENT_DOWNLOADS=3
      - MAX_FILE_AGE_MINUTES=30
      - RATE_LIMIT_REQUESTS=30
      - RATE_LIMIT_WINDOW_SECONDS=60
      - CORS_ORIGINS=http://localhost,http://localhost:3000
      - FFMPEG_PATH=ffmpeg
    volumes:
      - downloads:/app/downloads
    ports:
      - "8000:8000"
    networks:
      - superda-net

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: superda-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - superda-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: superda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - superda-net

volumes:
  downloads:

networks:
  superda-net:
    driver: bridge
